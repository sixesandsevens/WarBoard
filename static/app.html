<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WarBoard – Lobby</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #eeeeec;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Top bar ─────────────────────────────────────────────────────── */
    .top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      height: 44px;
      background: #171717;
      border-bottom: 1px solid #111;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04);
      position: sticky; top: 0; z-index: 10;
    }
    .brand-wrap { display: flex; align-items: center; gap: 9px; }
    .brand { font-weight: 700; font-size: 14px; color: #eeeeec; }
    .top-mascot {
      width: 28px; height: 28px; object-fit: contain; border-radius: 5px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); padding: 3px;
    }
    .top-mascot.missing { display: none; }
    .top-right { display: flex; align-items: center; gap: 10px; }
    .me { font-size: 13px; color: rgba(238,238,236,0.5); }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .wrap { max-width: 880px; margin: 0 auto; padding: 20px 14px 40px; }

    .intro { display: flex; gap: 14px; align-items: center; margin-bottom: 20px; }
    .intro-mascot {
      width: 72px; max-width: 16vw; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      padding: 5px;
    }
    .intro-mascot.missing { display: none; }
    .intro-copy h1 { font-size: 17px; font-weight: 700; color: #eeeeec; margin-bottom: 3px; }
    .intro-copy p { font-size: 13px; color: rgba(238,238,236,0.5); }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: #2a2a2a;
      border: 1px solid #383838;
      border-radius: 6px;
      padding: 14px;
    }

    .card-label {
      font-size: 11px; font-weight: 700; color: rgba(238,238,236,0.4);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    /* ── Action grid ─────────────────────────────────────────────────── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    @media (max-width: 740px) { .action-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .action-grid { grid-template-columns: 1fr; } }

    /* ── Form controls ───────────────────────────────────────────────── */
    input {
      display: block; width: 100%;
      padding: 7px 10px;
      background: #1a1a1a; color: #eeeeec;
      border: 1px solid #3d3d3d; border-radius: 4px;
      outline: none; font: inherit; font-size: 13px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    select {
      display: block; width: 100%;
      padding: 7px 10px;
      background: #1a1a1a; color: #eeeeec;
      border: 1px solid #3d3d3d; border-radius: 4px;
      outline: none; font: inherit; font-size: 13px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    select:focus {
      border-color: #3584e4;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 0 2px rgba(53,132,228,0.22);
    }
    input::placeholder { color: rgba(238,238,236,0.28); }
    input:focus {
      border-color: #3584e4;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 0 2px rgba(53,132,228,0.22);
    }

    .input-row { display: flex; gap: 7px; align-items: center; }
    .input-row input { flex: 1; min-width: 0; }
    .form-stack { display: flex; flex-direction: column; gap: 7px; }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    button {
      font: inherit; cursor: pointer; border-radius: 4px; font-size: 13px;
      font-weight: 600; line-height: 1.3; white-space: nowrap;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 80ms, box-shadow 80ms;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: #3584e4;
      border: 1px solid #1a6fc4;
      color: #fff;
      padding: 7px 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .btn-primary:hover:not(:disabled) { background: #3d8ef0; }
    .btn-primary:active:not(:disabled) { background: #2e74cc; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }

    .btn-ghost {
      background: #383838;
      border: 1px solid #484848;
      color: rgba(238,238,236,0.80);
      padding: 7px 14px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.25);
    }
    .btn-ghost:hover:not(:disabled) { background: #414141; color: #eeeeec; }
    .btn-ghost:active:not(:disabled) { background: #303030; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }

    .btn-danger {
      background: #383838;
      border: 1px solid #484848;
      color: #e06060;
      padding: 7px 14px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.25);
    }
    .btn-danger:hover:not(:disabled) { background: #3d2020; border-color: #5a2e2e; color: #e87878; }
    .btn-danger:active:not(:disabled) { box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }

    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── Tables / lobby list ─────────────────────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700; color: rgba(238,238,236,0.38);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin: 16px 0 7px;
    }
    .section-label:first-child { margin-top: 2px; }

    /* ── Session cards ───────────────────────────────────────────────── */
    .session-card {
      border: 1px solid #383838;
      border-radius: 5px;
      background: #252525;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .session-header {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 11px; cursor: pointer; user-select: none;
      min-height: 42px;
    }
    .session-header:hover { background: rgba(255,255,255,0.025); }
    .session-toggle {
      background: none; border: none; padding: 0 2px;
      color: rgba(238,238,236,0.4); font-size: 10px; cursor: pointer;
      flex: 0 0 auto; line-height: 1;
    }
    .session-toggle:hover { color: #eeeeec; }
    .session-name {
      font-weight: 600; font-size: 13px;
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .role-badge {
      flex: 0 0 auto;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 3px;
      background: #353535; border: 1px solid #484848;
      color: rgba(238,238,236,0.6);
    }
    .role-badge.gm {
      background: #3a3020; border-color: #5a4a1a; color: #c8a030;
    }
    .session-meta { flex: 0 0 auto; font-size: 12px; color: rgba(238,238,236,0.35); }
    .session-actions { display: flex; gap: 5px; flex: 0 0 auto; }

    .session-rooms { border-top: 1px solid #333; }
    .session-rooms.hidden { display: none; }

    .room-node {
      display: flex; gap: 8px; align-items: center;
      padding: 6px 11px; border-bottom: 1px solid #2e2e2e;
    }
    .room-node:last-child { border-bottom: none; }
    .room-node:hover { background: rgba(255,255,255,0.02); }
    .room-node-name {
      flex: 1; font-size: 13px;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: rgba(238,238,236,0.82);
    }
    .room-node-meta { font-size: 11px; color: rgba(238,238,236,0.35); margin-left: 5px; }
    .room-node-actions { display: flex; gap: 5px; flex: 0 0 auto; }

    /* ── Standalone rooms ────────────────────────────────────────────── */
    .room {
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      padding: 8px 11px;
      border: 1px solid #383838; border-radius: 5px;
      background: #252525; margin-bottom: 5px;
    }
    .room:hover { background: #272727; }
    .room-left { min-width: 0; flex: 1; }
    .rname { font-weight: 600; font-size: 13px; color: rgba(238,238,236,0.88); }
    .meta { font-size: 12px; color: rgba(238,238,236,0.4); margin-top: 1px; }
    .actions { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex: 0 0 auto; }

    /* ── Misc ────────────────────────────────────────────────────────── */
    .pill {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 11px; padding: 1px 5px; border-radius: 3px;
      background: #303030; border: 1px solid #424242;
      color: rgba(238,238,236,0.6);
    }
    a { color: #78aee8; text-decoration: none; }
    a:hover { color: #96c1f0; text-decoration: underline; }
    .small { font-size: 12px; color: rgba(238,238,236,0.45); }
    .hint { font-size: 12px; color: rgba(238,238,236,0.38); margin-top: 8px; }
    .err { font-size: 12px; color: #d47070; margin-top: 7px; min-height: 1em; }

    .view-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .hidden { display: none !important; }
    .view-tab {
      background: #2b2b2b;
      border: 1px solid #3b3b3b;
      color: rgba(238,238,236,0.82);
      padding: 7px 12px;
    }
    .view-tab.active {
      background: #3584e4;
      border-color: #1a6fc4;
      color: #fff;
    }
    .view-panel.hidden { display: none; }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    .split {
      display: grid;
      grid-template-columns: 1.1fr 1.4fr;
      gap: 14px;
    }
    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid #383838;
      border-radius: 5px;
      padding: 10px;
      background: #252525;
    }
    .mini-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(238,238,236,0.45);
      margin-bottom: 4px;
    }
    .mini-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #eeeeec;
    }
    .list-card {
      border: 1px solid #383838;
      border-radius: 5px;
      background: #252525;
      overflow: hidden;
    }
    .list-head {
      padding: 10px 12px;
      border-bottom: 1px solid #353535;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.03em;
    }
    .list-body {
      display: flex;
      flex-direction: column;
    }
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      border-top: 1px solid #313131;
    }
    .list-row:first-child { border-top: none; }
    .list-row-main { min-width: 0; flex: 1; }
    .list-row-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(238,238,236,0.88);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-row-meta {
      font-size: 12px;
      color: rgba(238,238,236,0.48);
      margin-top: 2px;
    }
    .banner {
      padding: 10px 12px;
      border-radius: 5px;
      border: 1px solid rgba(200,160,48,0.45);
      background: rgba(72,56,18,0.45);
      color: #e8d18a;
      font-size: 13px;
    }
    .banner.bad {
      border-color: rgba(196,84,84,0.45);
      background: rgba(76,28,28,0.5);
      color: #efb0b0;
    }
    .admin-layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 14px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .user-list-item {
      padding: 10px 12px;
      border-top: 1px solid #313131;
      cursor: pointer;
    }
    .user-list-item:first-child { border-top: none; }
    .user-list-item.active {
      background: rgba(53,132,228,0.15);
      box-shadow: inset 2px 0 0 #3584e4;
    }
    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .inline-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
      background: #333;
      border: 1px solid #474747;
      color: rgba(238,238,236,0.72);
    }
    .inline-badge.good {
      color: #8dd0a6;
      border-color: rgba(80,170,110,0.45);
      background: rgba(34,68,44,0.55);
    }
    .inline-badge.warn {
      color: #e8d18a;
      border-color: rgba(200,160,48,0.45);
      background: rgba(72,56,18,0.45);
    }
    .inline-badge.bad {
      color: #ef9a9a;
      border-color: rgba(196,84,84,0.45);
      background: rgba(76,28,28,0.5);
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .empty-state {
      padding: 12px;
      color: rgba(238,238,236,0.48);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .intro { align-items: flex-start; }
      .intro-mascot { width: 60px; max-width: none; }
      .intro-copy h1 { font-size: 15px; }
      .session-meta { display: none; }
      .panel-grid,
      .split,
      .admin-layout,
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand-wrap">
      <img class="top-mascot" src="/static/WarHamsterMascot.png" alt=""
           onerror="this.classList.add('missing');"/>
      <div class="brand">WarBoard</div>
    </div>
    <div class="top-right">
      <div class="me" id="me"></div>
      <button class="btn-ghost btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="wrap">
    <div class="intro">
      <img class="intro-mascot" src="/static/WarHamsterMascot.png" alt=""
           onerror="this.classList.add('missing');"/>
      <div class="intro-copy">
        <h1>Welcome to WarBoard</h1>
        <p>Manage your tables, account, and platform controls from one place.</p>
      </div>
    </div>

    <div class="view-tabs">
      <button id="viewLobbyBtn" class="view-tab active" type="button">Lobby</button>
      <button id="viewAccountBtn" class="view-tab" type="button">Account</button>
      <button id="viewAdminBtn" class="view-tab hidden" type="button">Admin</button>
    </div>

    <section id="viewLobby" class="view-panel">
      <div class="action-grid">
        <div class="card">
          <div class="card-label">New campaign session</div>
          <div class="form-stack">
            <input id="sessName" placeholder="Session name (e.g., Sewer Crawl)"/>
            <input id="sessRoomName" placeholder="First room (e.g., The Tavern)"/>
            <button class="btn-primary" id="createSessBtn">Create Session</button>
          </div>
          <div class="err" id="sessMsg"></div>
        </div>

        <div class="card">
          <div class="card-label">New table</div>
          <div class="input-row">
            <input id="newName" placeholder="Room name (e.g., The Tavern)"/>
            <button class="btn-primary" id="createBtn">Create</button>
          </div>
          <div class="hint">You'll get a join code to share with players.</div>
        </div>

        <div class="card">
          <div class="card-label">Join with a code</div>
          <div class="input-row">
            <input
              id="joinCode"
              placeholder="WHAM-XXXXXX"
              autocomplete="off"
              autocapitalize="characters"
              autocorrect="off"
              spellcheck="false"
              inputmode="text"
            />
            <button class="btn-primary" id="joinBtn">Join</button>
          </div>
          <div class="err" id="joinMsg"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Your recent tables</div>
        <div id="lobbyContent"></div>
        <div class="hint" style="margin-top:14px;">
          Share a join link like <span class="pill">warboard.app/join/WHAM-ABC123</span>
        </div>
      </div>
    </section>

    <section id="viewAccount" class="view-panel hidden">
      <div id="accountPanel" class="stack"></div>
    </section>

    <section id="viewAdmin" class="view-panel hidden">
      <div id="adminPanel" class="stack"></div>
    </section>
  </div>

<script>
(async function(){
  const meEl = document.getElementById('me');
  const lobbyEl = document.getElementById('lobbyContent');
  const joinMsg = document.getElementById('joinMsg');
  const accountPanel = document.getElementById('accountPanel');
  const adminPanel = document.getElementById('adminPanel');
  const viewLobby = document.getElementById('viewLobby');
  const viewAccount = document.getElementById('viewAccount');
  const viewAdmin = document.getElementById('viewAdmin');
  const viewLobbyBtn = document.getElementById('viewLobbyBtn');
  const viewAccountBtn = document.getElementById('viewAccountBtn');
  const viewAdminBtn = document.getElementById('viewAdminBtn');

  let currentMe = null;
  let currentView = 'lobby';
  let currentAdminUserId = null;
  let adminSearchQuery = '';
  let adminUsers = [];
  let adminPacks = [];
  let adminAuditEntries = [];
  let adminAuditFilters = { actorUserId: '', targetType: '', targetId: '', action: '' };

  async function api(url, opts){
    const res = await fetch(url, Object.assign({headers:{'Content-Type':'application/json'}}, opts||{}));
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.detail || ('HTTP ' + res.status));
    return data;
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmtDate(iso){
    if(!iso) return '';
    try{ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
    catch(e){ return iso.slice(0,10); }
  }

  function fmtDateTime(iso){
    if(!iso) return '';
    try{ return new Date(iso).toLocaleString(); }
    catch(e){ return iso; }
  }

  function statusBadge(status){
    const normalized = String(status || 'active').trim() || 'active';
    const cls = normalized === 'active' ? 'good' : (normalized === 'disabled' ? 'warn' : 'bad');
    return `<span class="inline-badge ${cls}">${escapeHtml(normalized)}</span>`;
  }

  function roleBadge(role){
    const normalized = String(role || 'user').trim() || 'user';
    const cls = normalized === 'owner' || normalized === 'admin' ? 'good' : (normalized === 'moderator' ? 'warn' : '');
    return `<span class="inline-badge ${cls}">${escapeHtml(normalized.replace(/_/g, ' '))}</span>`;
  }

  function canViewAdmin(){
    return !!currentMe && !currentMe.must_change_password && ['admin', 'owner'].includes(String(currentMe.role || ''));
  }

  function isPasswordLocked(){
    return !!(currentMe && currentMe.must_change_password);
  }

  function syncViewAccessControls(){
    const locked = isPasswordLocked();
    viewLobbyBtn.disabled = locked;
    viewAdminBtn.disabled = locked || !canViewAdmin();
    if(locked){
      viewLobbyBtn.title = 'Password change required';
      viewAdminBtn.title = 'Password change required';
    } else {
      viewLobbyBtn.title = '';
      viewAdminBtn.title = canViewAdmin() ? '' : 'Admin access required';
    }
  }

  function setHashView(next){
    const hash = next === 'lobby' ? '' : `#${next}`;
    history.replaceState(null, '', location.pathname + location.search + hash);
  }

  function flattenTree(rooms, rootRoomId){
    const byId = {};
    for(const r of rooms) byId[r.room_id] = Object.assign({}, r, {children:[]});
    const result = [];
    for(const r of rooms){
      const pid = r.parent_room_id;
      if(pid && byId[pid]) byId[pid].children.push(byId[r.room_id]);
    }
    function visit(node, depth){
      result.push({room: node, depth});
      node.children.sort((a,b) => (a.room_order||999999)-(b.room_order||999999) || (a.display_name||'').localeCompare(b.display_name||''));
      for(const c of node.children) visit(c, depth+1);
    }
    const roots = rootRoomId && byId[rootRoomId]
      ? [byId[rootRoomId]]
      : rooms.filter(r => !r.parent_room_id || !byId[r.parent_room_id]).map(r => byId[r.room_id]);
    for(const root of roots) visit(root, 0);
    const visited = new Set(result.map(x => x.room.room_id));
    for(const r of rooms) if(!visited.has(r.room_id)) result.push({room: byId[r.room_id], depth: 0});
    return result;
  }

  function makeRoomNode(r, depth, opts={}){
    const div = document.createElement('div');
    div.className = 'room-node';
    div.style.paddingLeft = (12 + depth * 16) + 'px';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'room-node-name';
    nameSpan.textContent = r.display_name || r.name;
    if(r.join_code){
      const code = document.createElement('span');
      code.className = 'room-node-meta';
      code.textContent = r.join_code;
      nameSpan.appendChild(code);
    }
    div.appendChild(nameSpan);

    const actions = document.createElement('div');
    actions.className = 'room-node-actions';

    const openBtn = document.createElement('button');
    openBtn.className = 'btn-primary btn-sm';
    openBtn.textContent = 'Open';
    openBtn.onclick = () => location.href = '/static/canvas.html?room=' + encodeURIComponent(r.room_id);
    actions.appendChild(openBtn);

    if(r.join_code){
      const copyBtn = document.createElement('button');
      copyBtn.className = 'btn-ghost btn-sm';
      copyBtn.textContent = 'Copy link';
      copyBtn.onclick = async () => {
        const link = location.origin + '/join/' + r.join_code;
        try{ await navigator.clipboard.writeText(link); copyBtn.textContent='Copied!'; setTimeout(()=>copyBtn.textContent='Copy link',1400); }
        catch(e){ alert(link); }
      };
      actions.appendChild(copyBtn);
    }

    if(opts.canRename){
      const renameBtn = document.createElement('button');
      renameBtn.className = 'btn-ghost btn-sm';
      renameBtn.textContent = 'Rename';
      renameBtn.onclick = async () => {
        const currentName = String(r.display_name || r.name || '').trim();
        const next = prompt('New room name?', currentName) || '';
        const name = next.trim();
        if(!name || name === currentName) return;
        renameBtn.disabled = true; renameBtn.textContent = 'Saving…';
        try{
          await api(`/api/rooms/${encodeURIComponent(r.room_id)}`, {method:'PATCH', body: JSON.stringify({name})});
          await refreshLobby();
        }catch(e){
          alert('Rename failed: ' + e.message);
          renameBtn.disabled = false;
          renameBtn.textContent = 'Rename';
        }
      };
      actions.appendChild(renameBtn);
    }

    if(opts.canDelete){
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-danger btn-sm';
      delBtn.textContent = 'Delete';
      delBtn.onclick = async () => {
        if(!confirm(`Delete "${r.display_name || r.name}"? This cannot be undone.`)) return;
        delBtn.disabled = true; delBtn.textContent = 'Deleting…';
        try{
          await api(`/api/rooms/${encodeURIComponent(r.room_id)}`, {method:'DELETE'});
          await refreshLobby();
        }catch(e){ alert('Delete failed: ' + e.message); delBtn.disabled=false; delBtn.textContent='Delete'; }
      };
      actions.appendChild(delBtn);
    }

    div.appendChild(actions);
    return div;
  }

  function renderSessions(sessions){
    const frag = document.createDocumentFragment();

    if(sessions.length){
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = 'Sessions';
      frag.appendChild(label);

      for(const sess of sessions){
        const card = document.createElement('div');
        card.className = 'session-card';

        const header = document.createElement('div');
        header.className = 'session-header';

        const toggle = document.createElement('button');
        toggle.className = 'session-toggle';
        toggle.textContent = '▶';
        toggle.setAttribute('aria-label', 'Expand session');
        header.appendChild(toggle);

        const nameEl = document.createElement('span');
        nameEl.className = 'session-name';
        nameEl.textContent = sess.name;
        header.appendChild(nameEl);

        const badge = document.createElement('span');
        badge.className = 'role-badge' + (sess.role === 'gm' ? ' gm' : '');
        badge.textContent = sess.role === 'gm' ? 'GM' : sess.role === 'co_gm' ? 'Co-GM' : 'Player';
        header.appendChild(badge);

        const roomCount = (sess.rooms || []).length;
        const metaEl = document.createElement('span');
        metaEl.className = 'session-meta';
        metaEl.textContent = roomCount + (roomCount===1?' room':' rooms') + ' · ' + fmtDate(sess.updated_at);
        header.appendChild(metaEl);

        // Action buttons grouped together
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'session-actions';

        const rootRoomId = sess.root_room_id || ((sess.rooms||[])[0] || {}).room_id;
        const rootRoom = (sess.rooms||[]).find(r => r.room_id === rootRoomId) || (sess.rooms||[])[0];
        const rootJoinCode = rootRoom && rootRoom.join_code;

        if(rootRoomId){
          const openMain = document.createElement('button');
          openMain.className = 'btn-primary btn-sm';
          openMain.textContent = 'Open';
          openMain.onclick = (e) => { e.stopPropagation(); location.href = '/static/canvas.html?room=' + encodeURIComponent(rootRoomId); };
          actionsDiv.appendChild(openMain);
        }

        if(rootJoinCode){
          const copyBtn = document.createElement('button');
          copyBtn.className = 'btn-ghost btn-sm';
          copyBtn.textContent = 'Copy code';
          copyBtn.onclick = async (e) => {
            e.stopPropagation();
            const link = location.origin + '/join/' + rootJoinCode;
            try{
              await navigator.clipboard.writeText(link);
              copyBtn.textContent = 'Copied!';
              setTimeout(() => copyBtn.textContent = 'Copy code', 1400);
            } catch(_){ alert(link); }
          };
          actionsDiv.appendChild(copyBtn);
        }

        if(sess.role === 'gm'){
          const delBtn = document.createElement('button');
          delBtn.className = 'btn-danger btn-sm';
          delBtn.textContent = 'Delete';
          delBtn.onclick = async (e) => {
            e.stopPropagation();
            if(!confirm(`Delete session "${sess.name}"?\n\nThis removes the session grouping but keeps all rooms as standalone tables.`)) return;
            delBtn.disabled = true; delBtn.textContent = 'Deleting…';
            try{
              await api(`/api/sessions/${encodeURIComponent(sess.id)}`, {method:'DELETE'});
              await refreshLobby();
            }catch(err){ alert('Delete failed: ' + err.message); delBtn.disabled=false; delBtn.textContent='Delete'; }
          };
          actionsDiv.appendChild(delBtn);
        }

        header.appendChild(actionsDiv);
        card.appendChild(header);

        const roomsDiv = document.createElement('div');
        roomsDiv.className = 'session-rooms hidden';

        const rooms = sess.rooms || [];
        if(rooms.length){
          const flat = flattenTree(rooms, sess.root_room_id);
          const canDelete = sess.role === 'gm';
          const canRename = sess.role === 'gm' || sess.role === 'co_gm';
          for(const {room, depth} of flat){
            roomsDiv.appendChild(makeRoomNode(room, depth, {canDelete, canRename}));
          }
        } else {
          const empty = document.createElement('div');
          empty.style.cssText = 'padding:10px 12px; opacity:.4; font-size:13px;';
          empty.textContent = 'No rooms in this session yet.';
          roomsDiv.appendChild(empty);
        }

        card.appendChild(roomsDiv);

        toggle.onclick = (e) => {
          e.stopPropagation();
          const hidden = roomsDiv.classList.toggle('hidden');
          toggle.textContent = hidden ? '▶' : '▼';
        };
        header.onclick = (e) => {
          if(e.target === header || e.target === nameEl || e.target === metaEl || e.target === badge){
            toggle.click();
          }
        };

        frag.appendChild(card);
      }
    }

    return frag;
  }

      if(r.role === 'owner'){
        const renameBtn = document.createElement('button');
        renameBtn.className = 'btn-ghost btn-sm';
        renameBtn.textContent = 'Rename';
        renameBtn.onclick = async () => {
          const currentName = String(r.name || '').trim();
          const next = prompt('New room name?', currentName) || '';
          const name = next.trim();
          if(!name || name === currentName) return;
          renameBtn.disabled = true; renameBtn.textContent = 'Saving…';
          try{
            await api(`/api/rooms/${encodeURIComponent(r.room_id)}`, {method:'PATCH', body: JSON.stringify({name})});
            await refreshLobby();
          }catch(e){
            alert('Rename failed: ' + e.message);
            renameBtn.disabled = false;
            renameBtn.textContent = 'Rename';
          }
        };
        right.appendChild(renameBtn);
      }

      if(r.role === 'owner'){
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-danger btn-sm';
        delBtn.textContent = 'Delete';
        delBtn.onclick = async () => {
          if(!confirm(`Delete "${r.name}"? This cannot be undone and will disconnect anyone currently in the room.`)) return;
          delBtn.disabled = true; delBtn.textContent = 'Deleting…';
          try{
            await api(`/api/rooms/${encodeURIComponent(r.room_id)}`, {method:'DELETE'});
            await refreshLobby();
          }catch(e){ alert('Delete failed: ' + e.message); delBtn.disabled=false; delBtn.textContent='Delete'; }
        };
        right.appendChild(delBtn);
      }

      div.appendChild(left);
      div.appendChild(right);
      frag.appendChild(div);
    }
    return frag;

  async function refreshShell(){
    currentMe = await api('/api/account/me');
    meEl.textContent = `${currentMe.username} · ${currentMe.role_label || currentMe.role || 'User'}`;
    const hasAdminRole = !!currentMe && ['admin', 'owner'].includes(String(currentMe.role || ''));
    viewAdminBtn.classList.toggle('hidden', !hasAdminRole);
    syncViewAccessControls();
    if ((isPasswordLocked() && currentView !== 'account') || (!canViewAdmin() && currentView === 'admin')) {
      await switchView('account');
    }
    return currentMe;
  }

  async function refreshLobby(){
    const [sessData, roomsData] = await Promise.all([
      api('/api/my/sessions'),
      api('/api/my/rooms'),
    ]);

    const sessions = sessData.sessions || [];
    const allRooms = roomsData.rooms || [];
    const standaloneRooms = allRooms.filter(r => !r.session_id);

    lobbyEl.innerHTML = '';
    if(!sessions.length && !standaloneRooms.length){
      lobbyEl.innerHTML = '<div class="small">No rooms yet — create one above or join with a code.</div>';
      return;
    }

    if(sessions.length) lobbyEl.appendChild(renderSessions(sessions));
    if(standaloneRooms.length || sessions.length) lobbyEl.appendChild(renderStandaloneRooms(standaloneRooms));
  }

  async function refreshAdmin(){
    if(!canViewAdmin()){
      adminPanel.innerHTML = '<div class="card"><div class="empty-state">Admin access required.</div></div>';
      return;
    }
    const auditParams = new URLSearchParams();
    auditParams.set('limit', '30');
    if(/^\d+$/.test(adminAuditFilters.actorUserId || '')) auditParams.set('actor_user_id', adminAuditFilters.actorUserId);
    if(adminAuditFilters.targetType) auditParams.set('target_type', adminAuditFilters.targetType);
    if(adminAuditFilters.targetId) auditParams.set('target_id', adminAuditFilters.targetId);
    if(adminAuditFilters.action) auditParams.set('action', adminAuditFilters.action);
    const [usersData, packsData, auditData] = await Promise.all([
      api(`/api/admin/users?q=${encodeURIComponent(adminSearchQuery)}&limit=120`),
      api('/api/admin/packs?limit=250'),
      api(`/api/admin/audit?${auditParams.toString()}`),
    ]);
    adminUsers = Array.isArray(usersData.users) ? usersData.users : [];
    adminPacks = Array.isArray(packsData.packs) ? packsData.packs : [];
    adminAuditEntries = Array.isArray(auditData.entries) ? auditData.entries : [];
    if(!currentAdminUserId && adminUsers.length){
      currentAdminUserId = Number(adminUsers[0].user_id || 0) || null;
    }
    if(currentAdminUserId && !adminUsers.some((user) => Number(user.user_id || 0) === Number(currentAdminUserId))){
      currentAdminUserId = adminUsers.length ? Number(adminUsers[0].user_id || 0) : null;
    }

    let detailData = null;
    if(currentAdminUserId){
      detailData = await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}`);
    }

    const selectedUser = detailData?.user || null;
    const entitlements = Array.isArray(detailData?.pack_entitlements) ? detailData.pack_entitlements : [];
    const uploads = Array.isArray(detailData?.uploads) ? detailData.uploads : [];
    const ownedPacks = Array.isArray(detailData?.packs_owned) ? detailData.packs_owned : [];
    const actorIsOwner = !!currentMe && currentMe.role === 'owner';
    const targetIsOwner = !!selectedUser && selectedUser.role === 'owner';
    const ownerActionBlocked = !!selectedUser && targetIsOwner && (!actorIsOwner || !!selectedUser.is_last_owner);
    const entitledPackIds = new Set(entitlements.map((entry) => Number(entry.pack_id || 0)));
    const grantablePacks = adminPacks.filter((pack) => {
      const packId = Number(pack.pack_id || 0);
      const ownerId = Number(pack.owner_user_id || 0);
      return !entitledPackIds.has(packId) && ownerId !== Number(currentAdminUserId || 0);
    });

    adminPanel.innerHTML = `
      <div class="admin-layout">
        <div class="list-card">
          <div class="list-head">
            <div class="search-row">
              <input id="adminSearchInput" type="text" placeholder="Search users..." value="${escapeHtml(adminSearchQuery)}"/>
              <button id="adminSearchBtn" class="btn-primary btn-sm" type="button">Search</button>
            </div>
          </div>
          <div class="list-body">
            ${adminUsers.length ? adminUsers.map((user) => `
              <div class="user-list-item ${Number(user.user_id || 0) === Number(currentAdminUserId) ? 'active' : ''}" data-admin-user-id="${escapeHtml(user.user_id)}">
                <div class="list-row-title">${escapeHtml(user.username)}</div>
                <div class="badge-row">
                  ${roleBadge(user.role)}
                  ${statusBadge(user.status)}
                  ${user.must_change_password ? `<span class="inline-badge warn">reset required</span>` : ''}
                </div>
              </div>
            `).join('') : `<div class="empty-state">No matching users found.</div>`}
          </div>
        </div>
        <div class="stack">
          ${selectedUser ? `
            <div class="card">
              <div class="card-label">User Detail</div>
              <div class="info-grid">
                <div class="mini-stat"><div class="mini-stat-label">Username</div><div class="mini-stat-value">${escapeHtml(selectedUser.username)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Role</div><div class="mini-stat-value">${escapeHtml(selectedUser.role)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Status</div><div class="mini-stat-value">${escapeHtml(selectedUser.status)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Joined</div><div class="mini-stat-value">${escapeHtml(fmtDate(selectedUser.created_at))}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Owned Rooms</div><div class="mini-stat-value">${escapeHtml(selectedUser.owned_room_count)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Active Sessions</div><div class="mini-stat-value">${escapeHtml(selectedUser.session_count)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Owned Uploads</div><div class="mini-stat-value">${escapeHtml(selectedUser.owned_asset_count)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Owned Packs</div><div class="mini-stat-value">${escapeHtml(selectedUser.owned_pack_count)}</div></div>
              </div>
              <div class="badge-row">
                ${roleBadge(selectedUser.role)}
                ${statusBadge(selectedUser.status)}
                ${selectedUser.is_last_owner ? `<span class="inline-badge bad">last owner</span>` : ''}
                ${selectedUser.must_change_password ? `<span class="inline-badge warn">reset required</span>` : ''}
              </div>
              ${selectedUser.role === 'owner' ? `<div class="hint" style="margin-top:8px;">Owner account. Owner-targeted actions require owner authority.</div>` : ''}
              ${selectedUser.is_last_owner ? `<div class="hint" style="margin-top:4px; color:#efb0b0;">This is the last active owner account. Disable, delete, reset, and demotion are blocked.</div>` : ''}
              <div class="detail-actions">
                ${selectedUser.status === 'active'
                  ? `<button class="btn-ghost btn-sm" type="button" data-admin-action="disable" ${ownerActionBlocked ? 'disabled' : ''}>Disable</button>`
                  : `<button class="btn-primary btn-sm" type="button" data-admin-action="enable" ${targetIsOwner && !actorIsOwner ? 'disabled' : ''}>Enable</button>`}
                <button class="btn-ghost btn-sm" type="button" data-admin-action="force-reset" ${ownerActionBlocked ? 'disabled' : ''}>Force Password Reset</button>
                <button class="btn-danger btn-sm" type="button" data-admin-action="soft-delete" ${ownerActionBlocked ? 'disabled' : ''}>Soft Delete</button>
              </div>
              ${currentMe && currentMe.role === 'owner' ? `
                <div class="detail-actions">
                  ${selectedUser.role !== 'admin' ? `<button class="btn-ghost btn-sm" type="button" data-admin-role="admin">Promote to Admin</button>` : ''}
                  ${selectedUser.role !== 'user' ? `<button class="btn-ghost btn-sm" type="button" data-admin-role="user" ${selectedUser.is_last_owner ? 'disabled' : ''}>Demote to User</button>` : ''}
                  ${selectedUser.role !== 'owner' ? `<button class="btn-primary btn-sm" type="button" data-admin-role="owner">Promote to Owner</button>` : ''}
                </div>
              ` : ''}
            </div>
            <div class="panel-grid">
              <div class="list-card">
                <div class="list-head">Owned Uploads</div>
                <div class="list-body">
                  ${uploads.length ? uploads.map((asset) => `
                    <div class="list-row">
                      <div class="list-row-main">
                        <div class="list-row-title">${escapeHtml(asset.name || asset.asset_id || 'Asset')}</div>
                        <div class="list-row-meta">${escapeHtml(asset.folder_path || 'root')} · ${escapeHtml(fmtDate(asset.created_at))}</div>
                      </div>
                    </div>
                  `).join('') : `<div class="empty-state">No owned uploads found.</div>`}
                </div>
              </div>
              <div class="list-card">
                <div class="list-head">Owned Packs</div>
                <div class="list-body">
                  ${ownedPacks.length ? ownedPacks.map((pack) => `
                    <div class="list-row">
                      <div class="list-row-main">
                        <div class="list-row-title">${escapeHtml(pack.name || pack.slug || 'Pack')}</div>
                        <div class="list-row-meta">${escapeHtml(pack.slug || '')} · ${escapeHtml(fmtDate(pack.created_at))}</div>
                      </div>
                    </div>
                  `).join('') : `<div class="empty-state">No owned packs found.</div>`}
                </div>
              </div>
            </div>
            <div class="split">
              <div class="list-card">
                <div class="list-head">Pack Entitlements</div>
                <div class="list-body">
                  ${entitlements.length ? entitlements.map((entry) => `
                    <div class="list-row">
                      <div class="list-row-main">
                        <div class="list-row-title">${escapeHtml(entry.pack_name || entry.pack_slug || 'Pack')}</div>
                        <div class="list-row-meta">${escapeHtml(entry.pack_slug || '')} · Granted ${escapeHtml(fmtDate(entry.granted_at))}</div>
                      </div>
                      <button class="btn-ghost btn-sm" type="button" data-revoke-pack-id="${escapeHtml(entry.pack_id)}">Revoke</button>
                    </div>
                  `).join('') : `<div class="empty-state">No direct pack entitlements.</div>`}
                </div>
              </div>
              <div class="card">
                <div class="card-label">Grant Pack Access</div>
                <div class="form-stack">
                  <select id="grantPackSelect" style="padding:7px 10px; background:#1a1a1a; color:#eeeeec; border:1px solid #3d3d3d; border-radius:4px;">
                    <option value="">Select a private pack</option>
                    ${grantablePacks.map((pack) => `<option value="${escapeHtml(pack.pack_id)}">${escapeHtml(pack.name || pack.slug || 'Pack')} · ${escapeHtml(pack.owner_username || 'unknown owner')}</option>`).join('')}
                  </select>
                  <button id="grantPackBtn" class="btn-primary" type="button" ${grantablePacks.length ? '' : 'disabled'}>Grant Access</button>
                </div>
                <div class="hint">Granting and revoking access is audit logged.</div>
              </div>
            </div>
          ` : `<div class="card"><div class="empty-state">Select a user to inspect their account and entitlements.</div></div>`}
          <div class="list-card">
            <div class="list-head">
              <div class="form-stack">
                <div>Recent Audit</div>
                <div class="search-row">
                  <input id="auditActorFilter" type="text" placeholder="Actor user id" value="${escapeHtml(adminAuditFilters.actorUserId)}"/>
                  <input id="auditTargetTypeFilter" type="text" placeholder="Target type" value="${escapeHtml(adminAuditFilters.targetType)}"/>
                  <input id="auditActionFilter" type="text" placeholder="Action prefix" value="${escapeHtml(adminAuditFilters.action)}"/>
                </div>
                <div class="search-row">
                  <input id="auditTargetIdFilter" type="text" placeholder="Target id" value="${escapeHtml(adminAuditFilters.targetId)}"/>
                  <button id="applyAuditFiltersBtn" class="btn-primary btn-sm" type="button">Apply</button>
                  <button id="resetAuditFiltersBtn" class="btn-ghost btn-sm" type="button">Reset</button>
                </div>
              </div>
            </div>
            <div class="list-body">
              ${adminAuditEntries.length ? adminAuditEntries.map((entry) => `
                <div class="list-row">
                  <div class="list-row-main">
                    <div class="list-row-title">${escapeHtml(entry.action || 'action')}</div>
                    <div class="list-row-meta">${escapeHtml(entry.summary || '')} · ${escapeHtml(fmtDateTime(entry.created_at))}</div>
                  </div>
                  <span class="pill">${escapeHtml(entry.target_type || '')}</span>
                </div>
              `).join('') : `<div class="empty-state">No audit entries yet.</div>`}
            </div>
          </div>
        </div>
      </div>
    `;
    bindAdminPanel();
  }

  async function switchView(next){
    const target = next === 'account' ? 'account' : (next === 'admin' ? 'admin' : 'lobby');
    if(isPasswordLocked() && target !== 'account'){
      return switchView('account');
    }
    if(target === 'admin' && !canViewAdmin()){
      return switchView('account');
    }
    currentView = target;
    viewLobby.classList.toggle('hidden', target !== 'lobby');
    viewAccount.classList.toggle('hidden', target !== 'account');
    viewAdmin.classList.toggle('hidden', target !== 'admin');
    viewLobbyBtn.classList.toggle('active', target === 'lobby');
    viewAccountBtn.classList.toggle('active', target === 'account');
    viewAdminBtn.classList.toggle('active', target === 'admin');
    setHashView(target);
    if(target === 'lobby') await refreshLobby();
    else if(target === 'account') await refreshAccount();
    else if(target === 'admin') await refreshAdmin();
  }

  document.getElementById('createBtn').onclick = async () => {
    const name = document.getElementById('newName').value.trim() || 'Untitled Room';
    const data = await api('/api/rooms', {method:'POST', body: JSON.stringify({name})});
    location.href = '/static/canvas.html?room=' + encodeURIComponent(data.room_id);
  };

  document.getElementById('createSessBtn').onclick = async () => {
    const sessMsg = document.getElementById('sessMsg');
    sessMsg.textContent = '';
    const sessName = document.getElementById('sessName').value.trim() || 'Untitled Session';
    const roomName = document.getElementById('sessRoomName').value.trim() || sessName;
    const btn = document.getElementById('createSessBtn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const room = await api('/api/rooms', {method:'POST', body: JSON.stringify({name: roomName})});
      await api('/api/sessions', {method:'POST', body: JSON.stringify({name: sessName, room_id: room.room_id})});
      location.href = '/static/canvas.html?room=' + encodeURIComponent(room.room_id);
    } catch(e) {
      sessMsg.textContent = e.message;
      btn.disabled = false; btn.textContent = 'Create Session';
    }
  };

  document.getElementById('joinBtn').onclick = async () => {
    joinMsg.textContent = '';
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    try{
      const data = await api('/api/join', {method:'POST', body: JSON.stringify({code})});
      location.href = '/static/canvas.html?room=' + encodeURIComponent(data.room_id);
    }catch(e){
      joinMsg.textContent = e.message;
    }
  };

  document.getElementById('logoutBtn').onclick = async () => {
    await fetch('/api/auth/logout', {method:'POST'});
    location.href = '/static/login.html';
  };

  viewLobbyBtn.onclick = () => { void switchView('lobby'); };
  viewAccountBtn.onclick = () => { void switchView('account'); };
  viewAdminBtn.onclick = () => { void switchView('admin'); };

  await refreshShell();
  const initialView = ['account', 'admin'].includes(location.hash.replace(/^#/, '')) ? location.hash.replace(/^#/, '') : 'lobby';
  await switchView(initialView);
})();
</script>
</body>
</html>

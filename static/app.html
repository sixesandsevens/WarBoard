<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WarBoard – Lobby</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e1e;
      color: #eeeeec;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Top bar ─────────────────────────────────────────────────────── */
    .top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      height: 44px;
      background: #171717;
      border-bottom: 1px solid #111;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04);
      position: sticky; top: 0; z-index: 10;
    }
    .brand-wrap { display: flex; align-items: center; gap: 9px; }
    .brand { font-weight: 700; font-size: 14px; color: #eeeeec; }
    .top-mascot {
      width: 28px; height: 28px; object-fit: contain; border-radius: 5px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); padding: 3px;
    }
    .top-mascot.missing { display: none; }
    .top-right { display: flex; align-items: center; gap: 10px; }
    .me { font-size: 13px; color: rgba(238,238,236,0.5); }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .wrap { max-width: 880px; margin: 0 auto; padding: 20px 14px 40px; }

    .intro { display: flex; gap: 14px; align-items: center; margin-bottom: 20px; }
    .intro-mascot {
      width: 72px; max-width: 16vw; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      padding: 5px;
    }
    .intro-mascot.missing { display: none; }
    .intro-copy h1 { font-size: 17px; font-weight: 700; color: #eeeeec; margin-bottom: 3px; }
    .intro-copy p { font-size: 13px; color: rgba(238,238,236,0.5); }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: #2a2a2a;
      border: 1px solid #383838;
      border-radius: 6px;
      padding: 14px;
    }

    .card-label {
      font-size: 11px; font-weight: 700; color: rgba(238,238,236,0.4);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    /* ── Action grid ─────────────────────────────────────────────────── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    @media (max-width: 740px) { .action-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .action-grid { grid-template-columns: 1fr; } }

    /* ── Form controls ───────────────────────────────────────────────── */
    input {
      display: block; width: 100%;
      padding: 7px 10px;
      background: #1a1a1a; color: #eeeeec;
      border: 1px solid #3d3d3d; border-radius: 4px;
      outline: none; font: inherit; font-size: 13px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    select {
      display: block; width: 100%;
      padding: 7px 10px;
      background: #1a1a1a; color: #eeeeec;
      border: 1px solid #3d3d3d; border-radius: 4px;
      outline: none; font: inherit; font-size: 13px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    select:focus {
      border-color: #3584e4;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 0 2px rgba(53,132,228,0.22);
    }
    input::placeholder { color: rgba(238,238,236,0.28); }
    input:focus {
      border-color: #3584e4;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3), 0 0 0 2px rgba(53,132,228,0.22);
    }

    .input-row { display: flex; gap: 7px; align-items: center; }
    .input-row input { flex: 1; min-width: 0; }
    .form-stack { display: flex; flex-direction: column; gap: 7px; }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    button {
      font: inherit; cursor: pointer; border-radius: 4px; font-size: 13px;
      font-weight: 600; line-height: 1.3; white-space: nowrap;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 80ms, box-shadow 80ms;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: #3584e4;
      border: 1px solid #1a6fc4;
      color: #fff;
      padding: 7px 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
    .btn-primary:hover:not(:disabled) { background: #3d8ef0; }
    .btn-primary:active:not(:disabled) { background: #2e74cc; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }

    .btn-ghost {
      background: #383838;
      border: 1px solid #484848;
      color: rgba(238,238,236,0.80);
      padding: 7px 14px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.25);
    }
    .btn-ghost:hover:not(:disabled) { background: #414141; color: #eeeeec; }
    .btn-ghost:active:not(:disabled) { background: #303030; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }

    .btn-danger {
      background: #383838;
      border: 1px solid #484848;
      color: #e06060;
      padding: 7px 14px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.25);
    }
    .btn-danger:hover:not(:disabled) { background: #3d2020; border-color: #5a2e2e; color: #e87878; }
    .btn-danger:active:not(:disabled) { box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }

    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── Tables / lobby list ─────────────────────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700; color: rgba(238,238,236,0.38);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin: 16px 0 7px;
    }
    .section-label:first-child { margin-top: 2px; }

    /* ── Session cards ───────────────────────────────────────────────── */
    .session-card {
      border: 1px solid #383838;
      border-radius: 5px;
      background: #252525;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .session-header {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 11px; cursor: pointer; user-select: none;
      min-height: 42px;
    }
    .session-header:hover { background: rgba(255,255,255,0.025); }
    .session-toggle {
      background: none; border: none; padding: 0 2px;
      color: rgba(238,238,236,0.4); font-size: 10px; cursor: pointer;
      flex: 0 0 auto; line-height: 1;
    }
    .session-toggle:hover { color: #eeeeec; }
    .session-name {
      font-weight: 600; font-size: 13px;
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .role-badge {
      flex: 0 0 auto;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 3px;
      background: #353535; border: 1px solid #484848;
      color: rgba(238,238,236,0.6);
    }
    .role-badge.gm {
      background: #3a3020; border-color: #5a4a1a; color: #c8a030;
    }
    .session-meta { flex: 0 0 auto; font-size: 12px; color: rgba(238,238,236,0.35); }
    .session-actions { display: flex; gap: 5px; flex: 0 0 auto; }

    .session-rooms { border-top: 1px solid #333; }
    .session-rooms.hidden { display: none; }

    .room-node {
      display: flex; gap: 8px; align-items: center;
      padding: 6px 11px; border-bottom: 1px solid #2e2e2e;
    }
    .room-node:last-child { border-bottom: none; }
    .room-node:hover { background: rgba(255,255,255,0.02); }
    .room-node-name {
      flex: 1; font-size: 13px;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: rgba(238,238,236,0.82);
    }
    .room-node-meta { font-size: 11px; color: rgba(238,238,236,0.35); margin-left: 5px; }
    .room-node-actions { display: flex; gap: 5px; flex: 0 0 auto; }

    /* ── Standalone rooms ────────────────────────────────────────────── */
    .room {
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      padding: 8px 11px;
      border: 1px solid #383838; border-radius: 5px;
      background: #252525; margin-bottom: 5px;
    }
    .room:hover { background: #272727; }
    .room-left { min-width: 0; flex: 1; }
    .rname { font-weight: 600; font-size: 13px; color: rgba(238,238,236,0.88); }
    .meta { font-size: 12px; color: rgba(238,238,236,0.4); margin-top: 1px; }
    .actions { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex: 0 0 auto; }

    /* ── Misc ────────────────────────────────────────────────────────── */
    .pill {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: 11px; padding: 1px 5px; border-radius: 3px;
      background: #303030; border: 1px solid #424242;
      color: rgba(238,238,236,0.6);
    }
    a { color: #78aee8; text-decoration: none; }
    a:hover { color: #96c1f0; text-decoration: underline; }
    .small { font-size: 12px; color: rgba(238,238,236,0.45); }
    .hint { font-size: 12px; color: rgba(238,238,236,0.38); margin-top: 8px; }
    .err { font-size: 12px; color: #d47070; margin-top: 7px; min-height: 1em; }

    .view-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .hidden { display: none !important; }
    .view-tab {
      background: #2b2b2b;
      border: 1px solid #3b3b3b;
      color: rgba(238,238,236,0.82);
      padding: 7px 12px;
    }
    .view-tab.active {
      background: #3584e4;
      border-color: #1a6fc4;
      color: #fff;
    }
    .view-panel.hidden { display: none; }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    .split {
      display: grid;
      grid-template-columns: 1.1fr 1.4fr;
      gap: 14px;
    }
    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid #383838;
      border-radius: 5px;
      padding: 10px;
      background: #252525;
    }
    .mini-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(238,238,236,0.45);
      margin-bottom: 4px;
    }
    .mini-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #eeeeec;
    }
    .list-card {
      border: 1px solid #383838;
      border-radius: 5px;
      background: #252525;
      overflow: hidden;
    }
    .list-head {
      padding: 10px 12px;
      border-bottom: 1px solid #353535;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.03em;
    }
    .list-body {
      display: flex;
      flex-direction: column;
    }
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      border-top: 1px solid #313131;
    }
    .list-row:first-child { border-top: none; }
    .list-row-main { min-width: 0; flex: 1; }
    .list-row-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(238,238,236,0.88);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-row-meta {
      font-size: 12px;
      color: rgba(238,238,236,0.48);
      margin-top: 2px;
    }
    .banner {
      padding: 10px 12px;
      border-radius: 5px;
      border: 1px solid rgba(200,160,48,0.45);
      background: rgba(72,56,18,0.45);
      color: #e8d18a;
      font-size: 13px;
    }
    .banner.bad {
      border-color: rgba(196,84,84,0.45);
      background: rgba(76,28,28,0.5);
      color: #efb0b0;
    }
    .admin-layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 14px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .user-list-item {
      padding: 10px 12px;
      border-top: 1px solid #313131;
      cursor: pointer;
    }
    .user-list-item:first-child { border-top: none; }
    .user-list-item.active {
      background: rgba(53,132,228,0.15);
      box-shadow: inset 2px 0 0 #3584e4;
    }
    .badge-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .inline-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 999px;
      background: #333;
      border: 1px solid #474747;
      color: rgba(238,238,236,0.72);
    }
    .inline-badge.good {
      color: #8dd0a6;
      border-color: rgba(80,170,110,0.45);
      background: rgba(34,68,44,0.55);
    }
    .inline-badge.warn {
      color: #e8d18a;
      border-color: rgba(200,160,48,0.45);
      background: rgba(72,56,18,0.45);
    }
    .inline-badge.bad {
      color: #ef9a9a;
      border-color: rgba(196,84,84,0.45);
      background: rgba(76,28,28,0.5);
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .empty-state {
      padding: 12px;
      color: rgba(238,238,236,0.48);
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .intro { align-items: flex-start; }
      .intro-mascot { width: 60px; max-width: none; }
      .intro-copy h1 { font-size: 15px; }
      .session-meta { display: none; }
      .panel-grid,
      .split,
      .admin-layout,
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand-wrap">
      <img class="top-mascot" src="/static/WarHamsterMascot.png" alt=""
           onerror="this.classList.add('missing');"/>
      <div class="brand">WarBoard</div>
    </div>
    <div class="top-right">
      <div class="me" id="me"></div>
      <button class="btn-ghost btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="wrap">
    <div class="intro">
      <img class="intro-mascot" src="/static/WarHamsterMascot.png" alt=""
           onerror="this.classList.add('missing');"/>
      <div class="intro-copy">
        <h1>Welcome to WarBoard</h1>
        <p>Manage your tables, account, and platform controls from one place.</p>
      </div>
    </div>

    <div class="view-tabs">
      <button id="viewLobbyBtn" class="view-tab active" type="button">Lobby</button>
      <button id="viewAccountBtn" class="view-tab" type="button">Account</button>
      <button id="viewRoomBtn" class="view-tab hidden" type="button">Room</button>
      <button id="viewSessionBtn" class="view-tab hidden" type="button">Session</button>
      <button id="viewAdminBtn" class="view-tab hidden" type="button">Admin</button>
    </div>

    <section id="viewLobby" class="view-panel">
      <div class="action-grid">
        <div class="card">
          <div class="card-label">New campaign session</div>
          <div class="form-stack">
            <input id="sessName" placeholder="Session name (e.g., Sewer Crawl)"/>
            <input id="sessRoomName" placeholder="First room (e.g., The Tavern)"/>
            <button class="btn-primary" id="createSessBtn">Create Session</button>
          </div>
          <div class="err" id="sessMsg"></div>
        </div>

        <div class="card">
          <div class="card-label">New table</div>
          <div class="input-row">
            <input id="newName" placeholder="Room name (e.g., The Tavern)"/>
            <button class="btn-primary" id="createBtn">Create</button>
          </div>
          <div class="hint">You'll get a join code to share with players.</div>
        </div>

        <div class="card">
          <div class="card-label">Join with a code</div>
          <div class="input-row">
            <input
              id="joinCode"
              placeholder="WHAM-XXXXXX"
              autocomplete="off"
              autocapitalize="characters"
              autocorrect="off"
              spellcheck="false"
              inputmode="text"
            />
            <button class="btn-primary" id="joinBtn">Join</button>
          </div>
          <div class="err" id="joinMsg"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Your recent tables</div>
        <div id="lobbyContent"></div>
        <div class="hint" style="margin-top:14px;">
          Share a join link like <span class="pill">warboard.app/join/WHAM-ABC123</span>
        </div>
      </div>
    </section>

    <section id="viewAccount" class="view-panel hidden">
      <div id="accountPanel" class="stack"></div>
    </section>

    <section id="viewRoom" class="view-panel hidden">
      <div id="roomPanel" class="stack"></div>
    </section>

    <section id="viewSession" class="view-panel hidden">
      <div id="sessionPanel" class="stack"></div>
    </section>

    <section id="viewAdmin" class="view-panel hidden">
      <div id="adminPanel" class="stack"></div>
    </section>
  </div>

<script>
(async function(){
  const meEl = document.getElementById('me');
  const lobbyEl = document.getElementById('lobbyContent');
  const joinMsg = document.getElementById('joinMsg');
  const accountPanel = document.getElementById('accountPanel');
  const roomPanel = document.getElementById('roomPanel');
  const adminPanel = document.getElementById('adminPanel');
  const viewLobby = document.getElementById('viewLobby');
  const viewAccount = document.getElementById('viewAccount');
  const viewRoom = document.getElementById('viewRoom');
  const viewAdmin = document.getElementById('viewAdmin');
  const viewLobbyBtn = document.getElementById('viewLobbyBtn');
  const viewAccountBtn = document.getElementById('viewAccountBtn');
  const viewRoomBtn = document.getElementById('viewRoomBtn');
  const viewSessionBtn = document.getElementById('viewSessionBtn');
  const viewAdminBtn = document.getElementById('viewAdminBtn');
  const viewSession = document.getElementById('viewSession');
  const sessionPanel = document.getElementById('sessionPanel');

  let currentMe = null;
  let currentView = 'lobby';
  let currentGovernanceRoomId = '';
  let currentGovernanceSessionId = '';
  let currentAdminUserId = null;
  let currentAdminOfficialPackId = null;
  let currentOfficialImportJobId = '';
  let currentOfficialImportPollTimer = 0;
  let adminSearchQuery = '';
  let adminRoomLookupId = '';
  let adminUsers = [];
  let adminPacks = [];
  let adminOfficialPacks = [];
  let adminAuditEntries = [];
  let adminAuditFilters = { actorUserId: '', targetType: '', targetId: '', action: '' };

  async function api(url, opts){
    const res = await fetch(url, Object.assign({headers:{'Content-Type':'application/json'}}, opts||{}));
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.detail || ('HTTP ' + res.status));
    return data;
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function fmtDate(iso){
    if(!iso) return '';
    try{ return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
    catch(e){ return iso.slice(0,10); }
  }

  function fmtDateTime(iso){
    if(!iso) return '';
    try{ return new Date(iso).toLocaleString(); }
    catch(e){ return iso; }
  }

  function statusBadge(status){
    const normalized = String(status || 'active').trim() || 'active';
    const cls = normalized === 'active' ? 'good' : (normalized === 'disabled' ? 'warn' : 'bad');
    return `<span class="inline-badge ${cls}">${escapeHtml(normalized)}</span>`;
  }

  function roleBadge(role){
    const normalized = String(role || 'user').trim() || 'user';
    const cls = normalized === 'owner' || normalized === 'admin' ? 'good' : (normalized === 'moderator' ? 'warn' : '');
    return `<span class="inline-badge ${cls}">${escapeHtml(normalized.replace(/_/g, ' '))}</span>`;
  }

  function packAccessLabel(source){
    const normalized = String(source || '').trim();
    if(normalized === 'official') return 'Official';
    if(normalized === 'owned') return 'Owned';
    if(normalized === 'session_shared') return 'Shared via Session';
    return 'Direct Access';
  }

  function packAccessBadge(source){
    const normalized = String(source || '').trim();
    const cls = normalized === 'owned' || normalized === 'official' ? 'good' : (normalized === 'session_shared' ? 'warn' : '');
    return `<span class="inline-badge ${cls}">${escapeHtml(packAccessLabel(normalized))}</span>`;
  }

  function packContentBadge(contentType){
    const normalized = String(contentType || 'asset_pack').trim() || 'asset_pack';
    return `<span class="inline-badge">${escapeHtml(normalized === 'token_pack' ? 'Token Pack' : 'Asset Pack')}</span>`;
  }

  function packSecondaryAccessNote(pack){
    const sources = Array.isArray(pack?.access_sources) ? pack.access_sources : [];
    const primary = String(pack?.access_source || '').trim();
    const extras = sources.filter((source) => source && source !== primary);
    if(!extras.length) return '';
    return 'Also ' + extras.map((source) => packAccessLabel(source)).join(' · ');
  }

  function stopOfficialImportPolling(){
    if(currentOfficialImportPollTimer){
      clearTimeout(currentOfficialImportPollTimer);
      currentOfficialImportPollTimer = 0;
    }
  }

  function setOfficialImportStatus(message, tone = ''){
    const el = document.getElementById('officialImportStatus');
    if(!el) return;
    el.textContent = String(message || '');
    el.style.color = tone === 'bad' ? '#d47070' : (tone === 'good' ? '#8dd0a6' : 'rgba(238,238,236,0.7)');
  }

  async function pollOfficialImportJob(jobId){
    if(!jobId) return;
    try{
      const data = await api(`/api/admin/official-import-jobs/${encodeURIComponent(jobId)}`);
      const job = data.job || {};
      const phase = String(job.phase || '');
      if(phase === 'queued' || phase === 'importing'){
        setOfficialImportStatus(`Importing ${job.filename || 'ZIP'} into ${job.pack_name || 'official pack'}...`);
        currentOfficialImportPollTimer = window.setTimeout(() => { void pollOfficialImportJob(jobId); }, 1200);
        return;
      }
      if(phase === 'completed'){
        setOfficialImportStatus(`Import complete: ${Number(job.created_count || 0)} imported, ${Number(job.skipped_count || 0)} skipped.`, 'good');
        currentOfficialImportJobId = '';
        stopOfficialImportPolling();
        await refreshAdmin();
        return;
      }
      if(phase === 'failed'){
        setOfficialImportStatus(job.error || 'Official import failed.', 'bad');
        currentOfficialImportJobId = '';
        stopOfficialImportPolling();
        return;
      }
      setOfficialImportStatus(`Import status: ${phase || 'unknown'}`);
    }catch(e){
      setOfficialImportStatus(e.message || 'Could not refresh import status.', 'bad');
      stopOfficialImportPolling();
    }
  }

  async function uploadOfficialZipInChunks(packId, file){
    const initData = await api(`/api/admin/official-packs/${encodeURIComponent(packId)}/imports/init`, {
      method: 'POST',
      body: JSON.stringify({filename: file.name, size: Number(file.size || 0)}),
    });
    const upload = initData.upload || {};
    const uploadId = String(upload.upload_id || '');
    const chunkSize = Number(upload.chunk_size || (8 * 1024 * 1024));
    if(!uploadId || !chunkSize) throw new Error('Import session failed to start.');
    let offset = 0;
    while(offset < file.size){
      const chunk = file.slice(offset, offset + chunkSize);
      const fd = new FormData();
      fd.set('file', chunk, file.name);
      fd.set('offset', String(offset));
      const res = await fetch(`/api/admin/official-imports/${encodeURIComponent(uploadId)}/chunk`, {
        method: 'POST',
        body: fd,
        credentials: 'same-origin',
      });
      const data = await res.json().catch(() => ({}));
      if(!res.ok) throw new Error(data.detail || (`HTTP ${res.status}`));
      offset += chunk.size;
      const pct = Math.min(100, Math.round((offset / Math.max(1, file.size)) * 100));
      setOfficialImportStatus(`Uploading ${file.name}... ${pct}%`);
    }
    const finishData = await api(`/api/admin/official-imports/${encodeURIComponent(uploadId)}/finish`, {method:'POST'});
    const job = finishData.job || {};
    currentOfficialImportJobId = String(job.job_id || '');
    setOfficialImportStatus(`Upload complete. Queued import for ${file.name}...`);
    stopOfficialImportPolling();
    if(currentOfficialImportJobId){
      void pollOfficialImportJob(currentOfficialImportJobId);
    }
  }

  function flattenTree(rooms, rootRoomId){
    const byId = {};
    for(const r of rooms) byId[r.room_id] = Object.assign({}, r, {children:[]});
    const result = [];
    for(const r of rooms){
      const pid = r.parent_room_id;
      if(pid && byId[pid]) byId[pid].children.push(byId[r.room_id]);
    }
    function visit(node, depth){
      result.push({room: node, depth});
      node.children.sort((a,b) => (a.room_order||999999)-(b.room_order||999999) || (a.display_name||'').localeCompare(b.display_name||''));
      for(const c of node.children) visit(c, depth+1);
    }
    const roots = rootRoomId && byId[rootRoomId]
      ? [byId[rootRoomId]]
      : rooms.filter(r => !r.parent_room_id || !byId[r.parent_room_id]).map(r => byId[r.room_id]);
    for(const root of roots) visit(root, 0);
    const visited = new Set(result.map(x => x.room.room_id));
    for(const r of rooms) if(!visited.has(r.room_id)) result.push({room: byId[r.room_id], depth: 0});
    return result;
  }

            e.stopPropagation();

            delBtn.disabled = true; delBtn.textContent = 'Deleting…';
            try{
              await api(`/api/sessions/${encodeURIComponent(sess.id)}`, {method:'DELETE'});

          for(const {room, depth} of flat){

          if(e.target === header || e.target === nameEl || e.target === metaEl || e.target === badge){

          }
        };

        frag.appendChild(card);
      }
    }

    return frag;
  }

  async function refreshAccount(){
    const [me, sessionData] = await Promise.all([
      api('/api/account/me'),
      api('/api/account/sessions'),
    ]);
    currentMe = me;
    meEl.textContent = `${currentMe.username} · ${currentMe.role_label || currentMe.role || 'User'}`;
    const hasAdminRole = !!currentMe && ['admin', 'owner'].includes(String(currentMe.role || ''));
    viewAdminBtn.classList.toggle('hidden', !hasAdminRole);
    syncViewAccessControls();
    const locked = !!me.must_change_password;
    let uploads = [];
    let packs = [];
    let tokenPacks = [];
    let accountLoadNotice = '';
    if(!locked){
      const [uploadResult, packResult, tokenPackResult] = await Promise.allSettled([
        api('/api/assets?pack=upload&lite=1&limit=8'),
        api('/api/private-packs'),
        api('/api/token-packs'),
      ]);
      if(uploadResult.status === 'fulfilled'){
        uploads = Array.isArray(uploadResult.value.assets) ? uploadResult.value.assets : [];
      }else{
        console.error('Failed to load account uploads', {endpoint:'/api/assets?pack=upload&lite=1&limit=8', error: uploadResult.reason});
        accountLoadNotice = accountLoadNotice || 'Some library data could not be loaded.';
      }
      if(packResult.status === 'fulfilled'){
        packs = Array.isArray(packResult.value.packs) ? packResult.value.packs : [];
      }else{
        console.error('Failed to load private packs', {endpoint:'/api/private-packs', error: packResult.reason});
        accountLoadNotice = accountLoadNotice || 'Some library data could not be loaded.';
      }
      if(tokenPackResult.status === 'fulfilled'){
        tokenPacks = Array.isArray(tokenPackResult.value.packs) ? tokenPackResult.value.packs : [];
      }else{
        console.error('Failed to load token packs', {endpoint:'/api/token-packs', error: tokenPackResult.reason});
        accountLoadNotice = accountLoadNotice || 'Some library data could not be loaded.';
      }

  function bindRoomPanel(room){
    const backBtn = document.getElementById('closeRoomGovernanceBtn');
    if(backBtn){
      backBtn.onclick = async () => {
        await switchView('lobby');
      };
    }
    roomPanel.querySelectorAll('[data-room-remove-user]').forEach((btn) => {
      btn.onclick = async () => {
        const userId = btn.getAttribute('data-room-remove-user');
        if(!room || !userId) return;
        if(!confirm('Remove this member from the room?')) return;
        btn.disabled = true;
        try{
          await api(`/api/rooms/${encodeURIComponent(room.room_id)}/members/${encodeURIComponent(userId)}/remove`, {method:'POST'});
          await refreshRoomGovernance();
        }catch(e){
          alert(e.message);
          btn.disabled = false;
        }
      };
    });
    roomPanel.querySelectorAll('[data-room-transfer-owner]').forEach((btn) => {
      btn.onclick = async () => {
        const userId = btn.getAttribute('data-room-transfer-owner');
        const username = btn.getAttribute('data-room-transfer-username') || 'this user';
        if(!room || !userId) return;
        if(!confirm(`Transfer room ownership to ${username}?`)) return;
        btn.disabled = true;
        try{
          await api(`/api/rooms/${encodeURIComponent(room.room_id)}/transfer-ownership`, {
            method:'POST',
            body: JSON.stringify({user_id: Number(userId)}),
          });
          await refreshRoomGovernance();
          await refreshLobby();
        }catch(e){
          alert(e.message);
          btn.disabled = false;
        }
      };
    });
  }

  async function refreshRoomGovernance(){
    syncViewAccessControls();
    if(!currentGovernanceRoomId){
      roomPanel.innerHTML = '<div class="card"><div class="empty-state">Select a room to manage from the lobby or the admin panel.</div></div>';
      return;
    }
    try{
      const data = await api(`/api/rooms/${encodeURIComponent(currentGovernanceRoomId)}/members`);
      const room = data.room || {};
      const members = Array.isArray(data.members) ? data.members : [];
      roomPanel.innerHTML = `
        <div class="card">
          <div class="card-label">Room Governance</div>
          <div class="info-grid">
            <div class="mini-stat"><div class="mini-stat-label">Room</div><div class="mini-stat-value">${escapeHtml(room.display_name || room.name || room.room_id || '')}</div></div>
            <div class="mini-stat"><div class="mini-stat-label">Room ID</div><div class="mini-stat-value">${escapeHtml(room.room_id || '')}</div></div>
            <div class="mini-stat"><div class="mini-stat-label">Join Code</div><div class="mini-stat-value">${escapeHtml(room.join_code || '—')}</div></div>
            <div class="mini-stat"><div class="mini-stat-label">Your Access</div><div class="mini-stat-value">${escapeHtml(String(room.actor_room_role || 'viewer').replace(/_/g, ' '))}</div></div>
          </div>
          <div class="badge-row">
            ${roleBadge(room.actor_room_role || 'viewer')}
            ${room.member_management_mode === 'session_inherited' ? `<span class="inline-badge warn">Session-backed</span>` : `<span class="inline-badge good">Standalone</span>`}
          </div>
          ${room.member_management_mode === 'session_inherited' ? `<div class="hint" style="margin-top:8px;">This room's membership is managed by its parent session. Use the Session view to add or remove members.</div>` : ''}
          <div class="detail-actions">
            <button id="closeRoomGovernanceBtn" class="btn-ghost btn-sm" type="button">Back to Lobby</button>
          </div>
        </div>
        <div class="list-card">
          <div class="list-head">Room Members</div>
          <div class="list-body">
            ${members.length ? members.map((member) => `
              <div class="list-row">
                <div class="list-row-main">
                  <div class="list-row-title">${escapeHtml(member.username || `user-${member.user_id}`)}</div>
                  <div class="list-row-meta">User #${escapeHtml(member.user_id)}${member.last_seen_at ? ` · Last seen ${escapeHtml(fmtDateTime(member.last_seen_at))}` : ''}</div>
                </div>
                <div class="detail-actions" style="margin-top:0;">
                  ${roleBadge(member.room_role || member.role || 'member')}
                  ${statusBadge(member.status || 'active')}
                  ${room.can_transfer_ownership && member.room_role !== 'owner' ? `<button class="btn-primary btn-sm" type="button" data-room-transfer-owner="${escapeHtml(member.user_id)}" data-room-transfer-username="${escapeHtml(member.username || '')}">Make Owner</button>` : ''}
                  ${room.can_manage_members && room.member_management_mode !== 'session_inherited' && member.room_role !== 'owner' ? `<button class="btn-danger btn-sm" type="button" data-room-remove-user="${escapeHtml(member.user_id)}">Remove</button>` : ''}
                </div>
              </div>
            `).join('') : `<div class="empty-state">No room members found.</div>`}
          </div>
        </div>
      `;
      bindRoomPanel(room);
    }catch(e){
      roomPanel.innerHTML = `
        <div class="card">
          <div class="card-label">Room Governance</div>
          <div class="empty-state">${escapeHtml(e.message || 'Unable to load room governance.')}</div>
          <div class="detail-actions">
            <button id="closeRoomGovernanceBtn" class="btn-ghost btn-sm" type="button">Back to Lobby</button>
          </div>
        </div>
      `;
      bindRoomPanel(null);
    }

  function bindSessionPanel(sess, members){
    const backBtn = document.getElementById('closeSessionGovernanceBtn');
    if(backBtn) backBtn.onclick = async () => { await switchView('lobby'); };

    sessionPanel.querySelectorAll('[data-sess-remove-user]').forEach((btn) => {
      btn.onclick = async () => {
        const userId = btn.getAttribute('data-sess-remove-user');
        const username = btn.getAttribute('data-sess-remove-username') || 'this user';
        if(!sess || !userId) return;
        if(!confirm(`Remove ${username} from the session?\n\nThis also removes them from all session rooms.`)) return;
        btn.disabled = true;
        try{
          await api(`/api/sessions/${encodeURIComponent(sess.session_id)}/members/${encodeURIComponent(userId)}/remove`, {method:'POST'});
          await refreshSessionGovernance();
        }catch(e){ alert(e.message); btn.disabled = false; }
      };
    });

    sessionPanel.querySelectorAll('[data-sess-set-role]').forEach((btn) => {
      btn.onclick = async () => {
        const userId = btn.getAttribute('data-sess-set-role');
        const newRole = btn.getAttribute('data-sess-role');
        const username = btn.getAttribute('data-sess-role-username') || 'this user';
        if(!sess || !userId || !newRole) return;
        const label = newRole === 'co_gm' ? 'Promote' : 'Demote';
        if(!confirm(`${label} ${username} to ${newRole === 'co_gm' ? 'Co-GM' : 'Player'}?`)) return;
        btn.disabled = true;
        try{
          await api(`/api/sessions/${encodeURIComponent(sess.session_id)}/members/${encodeURIComponent(userId)}/role`, {
            method:'POST', body: JSON.stringify({role: newRole}),
          });
          await refreshSessionGovernance();
        }catch(e){ alert(e.message); btn.disabled = false; }
      };
    });

    sessionPanel.querySelectorAll('[data-sess-transfer-gm]').forEach((btn) => {
      btn.onclick = async () => {
        const userId = btn.getAttribute('data-sess-transfer-gm');
        const username = btn.getAttribute('data-sess-transfer-username') || 'this user';
        if(!sess || !userId) return;
        if(!confirm(`Transfer GM to ${username}?\n\nYou will become Co-GM.`)) return;
        btn.disabled = true;
        try{
          await api(`/api/sessions/${encodeURIComponent(sess.session_id)}/transfer-gm`, {
            method:'POST', body: JSON.stringify({user_id: Number(userId)}),
          });
          await refreshSessionGovernance();
          await refreshLobby();
        }catch(e){ alert(e.message); btn.disabled = false; }
      };
    });

    sessionPanel.querySelectorAll('[data-sess-revoke-pack]').forEach((btn) => {
      btn.onclick = async () => {
        const packId = btn.getAttribute('data-sess-revoke-pack');
        const packName = btn.getAttribute('data-sess-revoke-packname') || 'this pack';
        if(!sess || !packId) return;
        if(!confirm(`Revoke "${packName}" from session "${sess.name}"?\n\nSession members will lose access immediately.`)) return;
        btn.disabled = true;
        try{
          await api(`/api/sessions/${encodeURIComponent(sess.session_id)}/shared-packs/${encodeURIComponent(packId)}/remove`, {method:'POST'});
          await refreshSessionGovernance();
        }catch(e){ alert(e.message); btn.disabled = false; }
      };
    });

    const shareBtn = document.getElementById('sessSharePackBtn');
    const shareSelect = document.getElementById('sessSharePackSelect');
    if(shareBtn && shareSelect && sess){

        const packId = shareSelect.value;

        shareBtn.disabled = true;
        try{
          await api(`/api/sessions/${encodeURIComponent(sess.session_id)}/shared-packs/${encodeURIComponent(packId)}`, {method:'POST'});
          await refreshSessionGovernance();
        }catch(e){ alert(e.message); shareBtn.disabled = false; }
      };
    }
  }

  async function refreshSessionGovernance(){
    syncViewAccessControls();
    if(!currentGovernanceSessionId){
      sessionPanel.innerHTML = '<div class="card"><div class="empty-state">Select a session to manage from the lobby.</div></div>';
      return;
    }
    try{
      const [membersData, packsData, myPacksData] = await Promise.all([
        api(`/api/sessions/${encodeURIComponent(currentGovernanceSessionId)}/members`),
        api(`/api/sessions/${encodeURIComponent(currentGovernanceSessionId)}/shared-packs`),
        api(`/api/private-packs?session_id=${encodeURIComponent(currentGovernanceSessionId)}`).catch(() => ({packs:[]})),
      ]);
      const sess = membersData.session || {};
      const members = Array.isArray(membersData.members) ? membersData.members : [];
      const sharedPacks = Array.isArray(packsData.packs) ? packsData.packs : [];
      const myPacks = Array.isArray(myPacksData.packs) ? myPacksData.packs : [];
      const unsharablePacks = myPacks.filter(p => !p.shared_in_session);
      const sessionRoleLabel = (r) => r === 'gm' ? 'GM' : r === 'co_gm' ? 'Co-GM' : 'Player';

            ${canManagePacks ? `
              <div class="list-row" style="border-top:1px solid #333;margin-top:8px;padding-top:8px;">
                <div class="list-row-main">
                  <div class="list-row-title">Share a pack</div>
                  <div class="list-row-meta">Only packs you own or have access to can be shared.</div>
                </div>
                <div class="detail-actions" style="margin-top:0;">
                  ${unsharablePacks.length ? `

                      <option value="">— pick a pack —</option>
                      ${unsharablePacks.map(p => `<option value="${escapeHtml(String(p.pack_id))}">${escapeHtml(p.name || p.slug || 'Pack')} · ${escapeHtml(p.content_type === 'token_pack' ? 'Token' : 'Asset')} · ${escapeHtml(packAccessLabel(p.access_source || 'owned'))}</option>`).join('')}

  function bindAdminPanel(){
    const adminSearchBtn = document.getElementById('adminSearchBtn');
    const adminSearchInput = document.getElementById('adminSearchInput');
    if(adminSearchBtn && adminSearchInput){
      adminSearchBtn.onclick = async () => {
        adminSearchQuery = adminSearchInput.value.trim();
        await refreshAdmin();
      };
      adminSearchInput.onkeydown = async (e) => {
        if(e.key === 'Enter'){
          e.preventDefault();
          adminSearchQuery = adminSearchInput.value.trim();
          await refreshAdmin();
        }
      };
    }
    adminPanel.querySelectorAll('[data-admin-user-id]').forEach((el) => {
      el.onclick = async () => {
        currentAdminUserId = Number(el.getAttribute('data-admin-user-id') || '0') || null;
        await refreshAdmin();
      };
    });
    adminPanel.querySelectorAll('[data-admin-action]').forEach((btn) => {
      btn.onclick = async () => {
        const action = btn.getAttribute('data-admin-action');
        if(!currentAdminUserId || !action) return;
        btn.disabled = true;
        try{
          if(action === 'disable'){
            const reason = prompt('Disable reason (optional):', '') || '';
            await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}/disable`, {
              method: 'POST',
              body: JSON.stringify({reason}),
            });
          } else if(action === 'enable'){
            await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}/enable`, {method:'POST'});
          } else if(action === 'force-reset'){
            await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}/force-password-reset`, {method:'POST'});
          } else if(action === 'soft-delete'){
            const reason = prompt('Soft-delete reason:', '') || '';
            if(!confirm('Soft-delete this user account? Login will be blocked but references will be preserved.')) return;
            await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}`, {
              method: 'DELETE',
              body: JSON.stringify({reason}),
            });
          }
          await refreshAdmin();
        }catch(e){
          alert(e.message);
        }finally{
          btn.disabled = false;
        }
      };
    });
    adminPanel.querySelectorAll('[data-admin-role]').forEach((btn) => {
      btn.onclick = async () => {
        const nextRole = btn.getAttribute('data-admin-role');
        if(!currentAdminUserId || !nextRole) return;
        const pretty = nextRole.replace(/_/g, ' ');
        if(!confirm(`Change this user's site role to ${pretty}?`)) return;
        btn.disabled = true;
        try{
          await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}/role`, {
            method: 'POST',
            body: JSON.stringify({role: nextRole}),
          });
          await refreshAdmin();
        }catch(e){
          alert(e.message);
          btn.disabled = false;
        }
      };
    });
    const grantBtn = document.getElementById('grantPackBtn');
    const grantSelect = document.getElementById('grantPackSelect');
    if(grantBtn && grantSelect){
      grantBtn.onclick = async () => {
        const packId = Number(grantSelect.value || '0');
        if(!currentAdminUserId || !packId) return;
        grantBtn.disabled = true;
        try{
          await api(`/api/admin/packs/${encodeURIComponent(packId)}/grant`, {
            method: 'POST',
            body: JSON.stringify({user_id: currentAdminUserId}),
          });
          await refreshAdmin();
        }catch(e){
          alert(e.message);
        }finally{
          grantBtn.disabled = false;
        }
      };
    }
    adminPanel.querySelectorAll('[data-revoke-pack-id]').forEach((btn) => {
      btn.onclick = async () => {
        const packId = Number(btn.getAttribute('data-revoke-pack-id') || '0');
        if(!currentAdminUserId || !packId) return;
        btn.disabled = true;
        try{
          await api(`/api/admin/packs/${encodeURIComponent(packId)}/revoke`, {
            method: 'POST',
            body: JSON.stringify({user_id: currentAdminUserId}),
          });
          await refreshAdmin();
        }catch(e){
          alert(e.message);
          btn.disabled = false;
        }
      };
    });
    const createOfficialPackBtn = document.getElementById('createOfficialPackBtn');
    if(createOfficialPackBtn){
      createOfficialPackBtn.onclick = async () => {
        const name = document.getElementById('officialPackName')?.value.trim() || '';
        const slug = document.getElementById('officialPackSlug')?.value.trim() || '';
        const contentType = document.getElementById('officialPackType')?.value || 'asset_pack';
        const globallyVisible = !!document.getElementById('officialPackGlobal')?.checked;
        if(!name) return;
        createOfficialPackBtn.disabled = true;
        try{
          await api('/api/admin/official-packs', {
            method: 'POST',
            body: JSON.stringify({name, slug, content_type: contentType, globally_visible: globallyVisible}),
          });
          await refreshAdmin();
        }catch(e){
          alert(e.message);
        }finally{
          createOfficialPackBtn.disabled = false;
        }
      };
    }
    const uploadOfficialPackBtn = document.getElementById('uploadOfficialPackBtn');
    if(uploadOfficialPackBtn){
      uploadOfficialPackBtn.onclick = async () => {
        const select = document.getElementById('officialPackSelect');
        const packId = select?.value || '';
        const fileInput = document.getElementById('officialPackFile');
        const file = fileInput?.files?.[0];
        if(!packId || !file) return;
        const isZip = /\.zip$/i.test(String(file.name || ''));
        uploadOfficialPackBtn.disabled = true;
        setOfficialImportStatus('');
        try{
          if(isZip){
            await uploadOfficialZipInChunks(packId, file);
          }else{
            const contentType = select?.selectedOptions?.[0]?.getAttribute('data-content-type') || 'asset_pack';
            const fd = new FormData();
            fd.set('file', file);
            const url = contentType === 'token_pack'
              ? `/api/token-packs/${encodeURIComponent(packId)}/upload`
              : `/api/admin/official-packs/${encodeURIComponent(packId)}/assets/upload`;
            const res = await fetch(url, {
              method:'POST', body: fd, credentials:'same-origin'
            });
            const data = await res.json().catch(()=>({}));
            if(!res.ok) throw new Error(data.detail || (`HTTP ${res.status}`));
            setOfficialImportStatus(`Uploaded ${file.name}.`, 'good');
            await refreshAdmin();
          }
        }catch(e){
          setOfficialImportStatus(e.message || 'Upload failed.', 'bad');
        }finally{
          uploadOfficialPackBtn.disabled = false;
        }
      };
    }
    adminPanel.querySelectorAll('[data-official-archive-pack]').forEach((btn) => {
      btn.onclick = async () => {
        const packId = btn.getAttribute('data-official-archive-pack');
        if(!packId) return;
        if(!confirm('Archive this official pack?')) return;
        btn.disabled = true;
        try{
          await api(`/api/admin/official-packs/${encodeURIComponent(packId)}/archive`, {method:'POST'});
          await refreshAdmin();
        }catch(e){
          alert(e.message);
          btn.disabled = false;
        }
      };
    });
    adminPanel.querySelectorAll('[data-official-delete-pack]').forEach((btn) => {
      btn.onclick = async () => {
        const packId = btn.getAttribute('data-official-delete-pack');
        const packName = btn.getAttribute('data-official-delete-pack-name') || 'official pack';
        if(!packId) return;
        const typed = window.prompt(`Type the official pack name to permanently delete it:\n\n${packName}`);
        if(typed === null) return;
        if(String(typed).trim() !== String(packName).trim()){
          alert('Pack name did not match. Delete cancelled.');
          return;
        }
        if(!confirm(`Permanently delete "${packName}"? This cannot be undone.`)) return;
        btn.disabled = true;
        try{
          await api(`/api/admin/official-packs/${encodeURIComponent(packId)}`, {method:'DELETE'});
          if(Number(currentAdminOfficialPackId || 0) === Number(packId || 0)){
            currentAdminOfficialPackId = null;
          }
          await refreshAdmin();
        }catch(e){
          alert(e.message);
          btn.disabled = false;
        }
      };
    });
    adminPanel.querySelectorAll('[data-admin-official-pack-id]').forEach((btn) => {
      btn.onclick = async () => {
        currentAdminOfficialPackId = Number(btn.getAttribute('data-admin-official-pack-id') || '0') || null;
        await refreshAdmin();
      };
    });
    const applyAuditFiltersBtn = document.getElementById('applyAuditFiltersBtn');
    const resetAuditFiltersBtn = document.getElementById('resetAuditFiltersBtn');
    if(applyAuditFiltersBtn){
      applyAuditFiltersBtn.onclick = async () => {
        adminAuditFilters = {
          actorUserId: document.getElementById('auditActorFilter')?.value.trim() || '',
          targetType: document.getElementById('auditTargetTypeFilter')?.value.trim() || '',
          targetId: document.getElementById('auditTargetIdFilter')?.value.trim() || '',
          action: document.getElementById('auditActionFilter')?.value.trim() || '',
        };
        await refreshAdmin();
      };
    }
    if(resetAuditFiltersBtn){
      resetAuditFiltersBtn.onclick = async () => {
        adminAuditFilters = { actorUserId: '', targetType: '', targetId: '', action: '' };
        await refreshAdmin();
      };
    }
    const adminRoomLookupBtn = document.getElementById('adminRoomLookupBtn');
    if(adminRoomLookupBtn){
      adminRoomLookupBtn.onclick = async () => {
        adminRoomLookupId = document.getElementById('adminRoomLookupInput')?.value.trim() || '';
        if(!adminRoomLookupId) return;
        await openRoomGovernance(adminRoomLookupId);
      };
    }
  }

  async function refreshAdmin(){
    if(!canViewAdmin()){
      adminPanel.innerHTML = '<div class="card"><div class="empty-state">Admin access required.</div></div>';
      return;
    }
    const auditParams = new URLSearchParams();
    auditParams.set('limit', '30');
    if(/^\d+$/.test(adminAuditFilters.actorUserId || '')) auditParams.set('actor_user_id', adminAuditFilters.actorUserId);
    if(adminAuditFilters.targetType) auditParams.set('target_type', adminAuditFilters.targetType);
    if(adminAuditFilters.targetId) auditParams.set('target_id', adminAuditFilters.targetId);
    if(adminAuditFilters.action) auditParams.set('action', adminAuditFilters.action);
    const [usersData, packsData, officialPacksData, auditData] = await Promise.all([
      api(`/api/admin/users?q=${encodeURIComponent(adminSearchQuery)}&limit=120`),
      api('/api/admin/packs?limit=250'),
      api('/api/admin/official-packs'),
      api(`/api/admin/audit?${auditParams.toString()}`),
    ]);
    adminUsers = Array.isArray(usersData.users) ? usersData.users : [];
    adminPacks = Array.isArray(packsData.packs) ? packsData.packs : [];
    adminOfficialPacks = Array.isArray(officialPacksData.packs) ? officialPacksData.packs : [];
    adminAuditEntries = Array.isArray(auditData.entries) ? auditData.entries : [];
    if(!currentAdminUserId && adminUsers.length){
      currentAdminUserId = Number(adminUsers[0].user_id || 0) || null;
    }
    if(currentAdminUserId && !adminUsers.some((user) => Number(user.user_id || 0) === Number(currentAdminUserId))){
      currentAdminUserId = adminUsers.length ? Number(adminUsers[0].user_id || 0) : null;
    }
    if(!currentAdminOfficialPackId && adminOfficialPacks.length){
      currentAdminOfficialPackId = Number(adminOfficialPacks[0].pack_id || 0) || null;
    }
    if(currentAdminOfficialPackId && !adminOfficialPacks.some((pack) => Number(pack.pack_id || 0) === Number(currentAdminOfficialPackId))){
      currentAdminOfficialPackId = adminOfficialPacks.length ? Number(adminOfficialPacks[0].pack_id || 0) : null;
    }

    let detailData = null;
    if(currentAdminUserId){
      detailData = await api(`/api/admin/users/${encodeURIComponent(currentAdminUserId)}`);
    }
    let officialPackDetail = null;
    if(currentAdminOfficialPackId){
      officialPackDetail = await api(`/api/admin/official-packs/${encodeURIComponent(currentAdminOfficialPackId)}`).catch(() => null);
    }

    const selectedUser = detailData?.user || null;
    const entitlements = Array.isArray(detailData?.pack_entitlements) ? detailData.pack_entitlements : [];
    const uploads = Array.isArray(detailData?.uploads) ? detailData.uploads : [];
    const ownedPacks = Array.isArray(detailData?.packs_owned) ? detailData.packs_owned : [];
    const actorIsOwner = !!currentMe && currentMe.role === 'owner';
    const targetIsOwner = !!selectedUser && selectedUser.role === 'owner';
    const ownerActionBlocked = !!selectedUser && targetIsOwner && (!actorIsOwner || !!selectedUser.is_last_owner);
    const entitledPackIds = new Set(entitlements.map((entry) => Number(entry.pack_id || 0)));
    const grantablePacks = adminPacks.filter((pack) => {
      const packId = Number(pack.pack_id || 0);
      const ownerId = Number(pack.owner_user_id || 0);
      return !entitledPackIds.has(packId) && ownerId !== Number(currentAdminUserId || 0);
    });

    adminPanel.innerHTML = `
      <div class="admin-layout">
        <div class="list-card">
          <div class="list-head">
            <div class="search-row">
              <input id="adminSearchInput" type="text" placeholder="Search users..." value="${escapeHtml(adminSearchQuery)}"/>
              <button id="adminSearchBtn" class="btn-primary btn-sm" type="button">Search</button>
            </div>
          </div>
          <div class="list-body">
            ${adminUsers.length ? adminUsers.map((user) => `
              <div class="user-list-item ${Number(user.user_id || 0) === Number(currentAdminUserId) ? 'active' : ''}" data-admin-user-id="${escapeHtml(user.user_id)}">
                <div class="list-row-title">${escapeHtml(user.username)}</div>
                <div class="badge-row">
                  ${roleBadge(user.role)}
                  ${statusBadge(user.status)}
                  ${user.must_change_password ? `<span class="inline-badge warn">reset required</span>` : ''}
                </div>
              </div>
            `).join('') : `<div class="empty-state">No matching users found.</div>`}
          </div>
        </div>
        <div class="stack">
          ${selectedUser ? `
            <div class="card">
              <div class="card-label">User Detail</div>
              <div class="info-grid">
                <div class="mini-stat"><div class="mini-stat-label">Username</div><div class="mini-stat-value">${escapeHtml(selectedUser.username)}</div></div>
                <div class="mini-stat"><div class="mini-stat-label">Role</div><div class="mini-stat-value">${escapeHtml(selectedUser.role)}</div></div>

                    <button class="btn-ghost btn-sm" type="button" data-admin-official-pack-id="${escapeHtml(pack.pack_id)}">Inspect</button>
                    ${pack.archived ? `<span class="inline-badge bad">archived</span>` : ''}
                    ${!pack.archived ? `<button class="btn-danger btn-sm" type="button" data-official-archive-pack="${escapeHtml(pack.pack_id)}">Archive</button>` : ''}
                    <button class="btn-danger btn-sm" type="button" data-official-delete-pack="${escapeHtml(pack.pack_id)}" data-official-delete-pack-name="${escapeHtml(pack.name || pack.slug || 'Official Pack')}">Delete</button>
                  </div>
                </div>
              `).join('') : `<div class="empty-state">No official packs yet.</div>`}
            </div>
          </div>
          <div class="list-card">
            <div class="list-head">Official Pack Detail</div>
            <div class="list-body">
              ${officialPackDetail?.pack ? `
                <div class="list-row">
                  <div class="list-row-main">
                    <div class="list-row-title">${escapeHtml(officialPackDetail.pack.name || officialPackDetail.pack.slug || 'Pack')}</div>
                    <div class="list-row-meta">${escapeHtml(officialPackDetail.pack.description || 'No description')} · ${escapeHtml((officialPackDetail.items || []).length)} items</div>
                  </div>
                  <div class="badge-row">${packContentBadge(officialPackDetail.pack.content_type)}${packAccessBadge('official')}</div>
                </div>
              ` : `<div class="empty-state">Select an official pack to inspect its contents.</div>`}
              ${Array.isArray(officialPackDetail?.items) && officialPackDetail.items.length ? officialPackDetail.items.slice(0, 12).map((item) => `
                <div class="list-row">
                  <div class="list-row-main">
                    <div class="list-row-title">${escapeHtml(item.name || item.asset_id || 'Item')}</div>
                    <div class="list-row-meta">${escapeHtml(item.folder_path || 'root')} · ${escapeHtml(fmtDate(item.created_at))}</div>
                  </div>
                </div>
              `).join('') : ''}
            </div>
          </div>
          <div class="list-card">
            <div class="list-head">
              <div class="form-stack">
                <div>Recent Audit</div>
                <div class="search-row">
                  <input id="auditActorFilter" type="text" placeholder="Actor user id" value="${escapeHtml(adminAuditFilters.actorUserId)}"/>
                  <input id="auditTargetTypeFilter" type="text" placeholder="Target type" value="${escapeHtml(adminAuditFilters.targetType)}"/>
                  <input id="auditActionFilter" type="text" placeholder="Action prefix" value="${escapeHtml(adminAuditFilters.action)}"/>
                </div>
                <div class="search-row">
                  <input id="auditTargetIdFilter" type="text" placeholder="Target id" value="${escapeHtml(adminAuditFilters.targetId)}"/>
                  <button id="applyAuditFiltersBtn" class="btn-primary btn-sm" type="button">Apply</button>
                  <button id="resetAuditFiltersBtn" class="btn-ghost btn-sm" type="button">Reset</button>
                </div>
              </div>
            </div>
            <div class="list-body">
              ${adminAuditEntries.length ? adminAuditEntries.map((entry) => `
                <div class="list-row">
                  <div class="list-row-main">
                    <div class="list-row-title">${escapeHtml(entry.action || 'action')}</div>
                    <div class="list-row-meta">${escapeHtml(entry.summary || '')} · ${escapeHtml(fmtDateTime(entry.created_at))}</div>
                  </div>
                  <span class="pill">${escapeHtml(entry.target_type || '')}</span>
                </div>
              `).join('') : `<div class="empty-state">No audit entries yet.</div>`}
            </div>
          </div>
        </div>
      </div>
    `;
    bindAdminPanel();
    if(currentOfficialImportJobId){
      stopOfficialImportPolling();
      currentOfficialImportPollTimer = window.setTimeout(() => { void pollOfficialImportJob(currentOfficialImportJobId); }, 400);
    }
  }

  async function switchView(next){
    const target = next === 'account' ? 'account' : (next === 'admin' ? 'admin' : (next === 'room' ? 'room' : (next === 'session' ? 'session' : 'lobby')));
    if(isPasswordLocked() && target !== 'account'){
      return switchView('account');
    }
    if(target === 'room' && !currentGovernanceRoomId){
      return switchView('lobby');
    }
    if(target === 'session' && !currentGovernanceSessionId){
      return switchView('lobby');
    }
    if(target === 'admin' && !canViewAdmin()){
      return switchView('account');
    }
    currentView = target;
    viewLobby.classList.toggle('hidden', target !== 'lobby');
    viewAccount.classList.toggle('hidden', target !== 'account');
    viewRoom.classList.toggle('hidden', target !== 'room');
    viewSession.classList.toggle('hidden', target !== 'session');
    viewAdmin.classList.toggle('hidden', target !== 'admin');
    viewLobbyBtn.classList.toggle('active', target === 'lobby');
    viewAccountBtn.classList.toggle('active', target === 'account');
    viewRoomBtn.classList.toggle('active', target === 'room');
    viewSessionBtn.classList.toggle('active', target === 'session');
    viewAdminBtn.classList.toggle('active', target === 'admin');
    setHashView(target);
    if(target === 'lobby') await refreshLobby();
    else if(target === 'account') await refreshAccount();
    else if(target === 'room') await refreshRoomGovernance();
    else if(target === 'session') await refreshSessionGovernance();
    else if(target === 'admin') await refreshAdmin();
  }

  document.getElementById('createBtn').onclick = async () => {
    const name = document.getElementById('newName').value.trim() || 'Untitled Room';
    const data = await api('/api/rooms', {method:'POST', body: JSON.stringify({name})});
    location.href = '/static/canvas.html?room=' + encodeURIComponent(data.room_id);
  };

  document.getElementById('createSessBtn').onclick = async () => {
    const sessMsg = document.getElementById('sessMsg');
    sessMsg.textContent = '';
    const sessName = document.getElementById('sessName').value.trim() || 'Untitled Session';
    const roomName = document.getElementById('sessRoomName').value.trim() || sessName;
    const btn = document.getElementById('createSessBtn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const room = await api('/api/rooms', {method:'POST', body: JSON.stringify({name: roomName})});
      await api('/api/sessions', {method:'POST', body: JSON.stringify({name: sessName, room_id: room.room_id})});
      location.href = '/static/canvas.html?room=' + encodeURIComponent(room.room_id);
    } catch(e) {
      sessMsg.textContent = e.message;
      btn.disabled = false; btn.textContent = 'Create Session';
    }
  };

  document.getElementById('joinBtn').onclick = async () => {
    joinMsg.textContent = '';
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    try{
      const data = await api('/api/join', {method:'POST', body: JSON.stringify({code})});
      location.href = '/static/canvas.html?room=' + encodeURIComponent(data.room_id);
    }catch(e){
      joinMsg.textContent = e.message;
    }
  };

  document.getElementById('logoutBtn').onclick = async () => {
    await fetch('/api/auth/logout', {method:'POST'});
    location.href = '/static/login.html';
  };

  viewLobbyBtn.onclick = () => { void switchView('lobby'); };
  viewAccountBtn.onclick = () => { void switchView('account'); };
  viewRoomBtn.onclick = () => { void switchView('room'); };
  viewSessionBtn.onclick = () => { void switchView('session'); };
  viewAdminBtn.onclick = () => { void switchView('admin'); };

  // --- Toast notifications ---
  const _toastEl = (() => {
    const el = document.createElement('div');
    el.id = 'appToastContainer';
    el.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none;';
    document.body.appendChild(el);
    return el;
  })();
  function toast(msg, durationMs = 3000) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'background:rgba(0,0,0,.82);color:#fff;padding:.55rem 1.1rem;border-radius:.5rem;font-size:.9rem;max-width:32rem;text-align:center;opacity:1;transition:opacity .4s;';
    _toastEl.appendChild(t);
    setTimeout(() => {
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 420);
    }, durationMs);
  }

  // --- Governance websocket (/ws/app) ---
  let appWs = null;
  let _appWsReconnectTimeout = null;
  function connectAppWs() {
    if (appWs && appWs.readyState <= 1) return;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    appWs = new WebSocket(`${proto}//${location.host}/ws/app`);
    appWs.onmessage = (e) => {
      let ev;
      try { ev = JSON.parse(e.data); } catch { return; }
      if (!ev || !ev.type) return;
      if (ev.type === 'SESSION_GOVERNANCE_UPDATED') {
        const sessId = ev.payload && ev.payload.session_id;
        if (sessId && sessId === currentGovernanceSessionId) {
          refreshSessionGovernance().catch(() => {});
        }
        return;
      }
      if (ev.type === 'ROOM_GOVERNANCE_UPDATED') {
        const roomId = ev.payload && ev.payload.room_id;
        if (roomId && roomId === currentGovernanceRoomId) {
          refreshRoomGovernance(roomId).catch(() => {});
        }
        return;
      }
      if (ev.type === 'GOVERNANCE_NOTICE') {
        if (ev.payload && ev.payload.personal_message) toast(ev.payload.personal_message);
        if (ev.payload && ev.payload.access_lost) {
          setTimeout(() => location.reload(), 2500);
        }
        return;
      }
    };
    appWs.onclose = () => {
      clearTimeout(_appWsReconnectTimeout);
      _appWsReconnectTimeout = setTimeout(() => connectAppWs(), 5000);
    };
    appWs.onerror = () => { try { appWs.close(); } catch {} };
  }
  connectAppWs();

  await refreshShell();
  const initialView = ['account', 'admin', 'room'].includes(location.hash.replace(/^#/, '')) ? location.hash.replace(/^#/, '') : 'lobby';
  await switchView(initialView);
})();
</script>
</body>
</html>
